<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCS 영상그래픽 전체 진행상황</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>NCS 영상그래픽 전체 진행상황 대시보드</h1>
        <div class="total-progress">전체 진행률: <span id="grand-total">0</span>%</div>
    </div>
    
    <div class="table-container">
        <table id="dashboard-table">
            <thead>
                <tr id="date-row">
                    </tr>
                <tr id="stage-row">
                    </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
            <tfoot>
                <tr id="footer-row">
                    </tr>
            </tfoot>
        </table>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
